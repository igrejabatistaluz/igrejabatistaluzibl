<section class="devocionais-page section">
  <div class="container">
    <div class="page-header">
      <h1>Devocionais</h1>
      <p>Reflexões diárias da Palavra de Deus para fortalecer sua fé</p>
    </div>

    <div class="devocionais-grid">
      @for (devocional of devocionais(); track devocional.id) {
        <article class="devocional-card card">
          <div class="devocional-header">
            <span class="devocional-date">{{ devocional.date }}</span>
            <h2>{{ devocional.title }}</h2>
          </div>
          
          <div class="devocional-verse">
            <p class="verse-text">"{{ devocional.verse }}"</p>
            <p class="verse-reference">{{ devocional.verseReference }}</p>
          </div>

          <div class="devocional-content">
            <p>{{ devocional.content }}</p>
          </div>

          <div class="devocional-footer">
            <span class="devocional-author">— {{ devocional.author }}</span>
          </div>
        </article>
      }
    </div>
  </div>
</section>
