<section class="instagram-feed section" id="instagram">
  <div class="container">
    <div class="section-title">
      <h2>{{ sectionTitle() }}</h2>
      <p>{{ sectionSubtitle() }}</p>
    </div>

    <div class="instagram-grid">
      @for (post of instagramPosts(); track post.id) {
        <div class="instagram-card">
          <div class="post-image-wrapper">
            <img 
              [src]="post.image" 
              [alt]="post.caption"
              loading="lazy"
              class="post-image"
            >
            <div class="post-overlay">
              <div class="post-stats">
                <span class="stat-item">
                  <span class="stat-icon">❤️</span>
                  <span class="stat-value">{{ formatNumber(post.likes) }}</span>
                </span>
                <span class="stat-item">
                  <span class="stat-icon">💬</span>
                  <span class="stat-value">{{ formatNumber(post.comments) }}</span>
                </span>
              </div>
            </div>
          </div>
          <div class="post-caption">
            <p>{{ post.caption }}</p>
            <span class="post-date">{{ post.date }}</span>
          </div>
        </div>
      }
    </div>

    <div class="instagram-cta">
      <a 
        [href]="instagramUrl" 
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-primary instagram-btn"
      >
        <span class="btn-icon">📷</span>
        {{ buttonText() }}
      </a>
    </div>
  </div>
</section>
